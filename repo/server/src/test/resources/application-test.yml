spring:
  datasource:
    url: jdbc:tc:postgresql:16:///meridian_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    locations: classpath:db/migration
    enabled: true

app:
  jwt:
    signing-key: test-signing-key-32-bytes-minimum-ok
    access-token-ttl-minutes: 15
    refresh-token-idle-hours: 8
    refresh-token-absolute-hours: 12
  backup-path: /tmp/meridian-test-backups
