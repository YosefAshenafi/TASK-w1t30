spring:
  application:
    name: meridian
  jpa:
    hibernate:
      ddl-auto: none
    generate-ddl: false
    open-in-view: false
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    signing-key: ${JWT_SIGNING_KEY:changeme-replace-in-production-must-be-long}
    access-token-ttl-seconds: 900
  aes-key-base64: ${AES_KEY_BASE64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  backup-path: ${BACKUP_PATH:/app/backups}
  export-path: ${EXPORT_PATH:/app/exports}

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:meridian}
    username: ${DB_USERNAME:meridian}
    password: ${DB_PASSWORD:meridian_secret}
    driver-class-name: org.postgresql.Driver
  flyway:
    locations: classpath:db/migration,classpath:db/migration/local

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:meridian}
    username: ${DB_USERNAME:meridian}
    password: ${DB_PASSWORD:meridian_secret}
    driver-class-name: org.postgresql.Driver
  flyway:
    locations: classpath:db/migration,classpath:db/migration/local

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        default_schema: public
