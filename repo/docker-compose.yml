services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-meridian}
      POSTGRES_USER: ${DB_USERNAME:-meridian}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meridian_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-meridian} -d ${DB_NAME:-meridian}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meridian_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-meridian}
      DB_USERNAME: ${DB_USERNAME:-meridian}
      DB_PASSWORD: ${DB_PASSWORD:-meridian_secret}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-changeme-must-be-at-least-32-characters-long-for-hmac-sha256}
      AES_KEY_BASE64: ${AES_KEY_BASE64:-SvjpDSe1RUNFA4oCHi4CMu09NkZeMGwf+fc0Lvgclhg=}
      BACKUP_PATH: ${BACKUP_PATH:-/app/backups}
      EXPORT_PATH: ${EXPORT_PATH:-/app/exports}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    volumes:
      - backups:/app/backups
      - exports:/app/exports
    networks:
      - meridian_net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - meridian_net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    environment:
      MERIDIAN_HTTPS_PORT: ${MERIDIAN_HTTPS_PORT:-8443}
    ports:
      # HTTP (redirect only) — default 8080 avoids port-80 conflicts.
      # Override: MERIDIAN_HTTP_PORT=80 docker compose up -d
      - "${MERIDIAN_HTTP_PORT:-8080}:80"
      # HTTPS with self-signed certificate — default 8443.
      # Override: MERIDIAN_HTTPS_PORT=443 docker compose up -d
      - "${MERIDIAN_HTTPS_PORT:-8443}:443"
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSk https://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - meridian_net

volumes:
  postgres_data:
  backups:
  exports:

networks:
  meridian_net:
    driver: bridge
